services:
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: link_shortener_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
    driver: local